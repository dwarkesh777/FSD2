<!-- intialize two variable and increment both the variable each time display the adition of both variable at interval of 1 sec -->
 <html>
    <body>
        <p id="p1"></p>
        <script>{
            a=1
            b=2
            setInterval(abc,1000);
           function abc(){
            a+=1
            b+=2
            document.getElementById("p1").innerHTML=a+b

           }
        }
        </script>
    </body>
</html>
