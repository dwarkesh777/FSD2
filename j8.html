<!-- consider below object and fetch values using for of loop and for in loop  -->

<script>
sub={
    "fsd":[
        {
            "topic":"html",
            "course":"beginer",
            "content":["tags","table","form"]
               
        },
        {
            "topic":"css",
            "course":"beginer",
            "content":["style","color"]
        }
        ]}

        for (x in sub.fsd){
            for (y in sub.fsd[x]){
                document.write(sub.fsd[x][y]+"<br>")
            }
        }
           document.write("<hr>")
        for (x1 of sub.fsd){
            document.write(x1.topic+"<br>")
        }
</script>
