<!-- list of data type
1. String
2. Number
3. Object
4. Array
5. Boolean
6. Null
-->
<!-- list of not allow
1. Function
2. Undefined    
3. Symbol
4. BigInt
5. Date
6.undefined
-->
<html>
    <head>
        <title>JSON Data Types</title>
        <Script>
            var data = {
                "string": "Hello, World!",
                "number": 42,
                "object": {"key": "value","nested":  "nestedValue"},
                "array": [1, 2, 3],
                "boolean": true,
                "nullValue": null
            };

            console.log("String: " + data.string);
            console.log("Number: " + data.number);
            console.log("Object: " + data.object.key + ", " + data.object.nested);
            console.log("Array: " + data.array[0] + ", " + data.array[1] + ", " + data.array[2]);
            console.log("Boolean: " + data.boolean);
            console.log("Null: " + data.nullValue);
        </Script>
    </head>
</html>
