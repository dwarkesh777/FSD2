<!-- updating value of existing object key -->
 <html>
    <head>
        <title>Updating JSON Object</title>
        <Script>
            var person = {
                "name": "John Doe",
                "age": 30,
                "city": "New York"
            };
            console.log("Age: " + person.age);

            // Updating the age
            person.age = 31;
// person["age"] = 31; // alternative way to update the age
// person["age"] += 1; // incrementing the age by 1
// let ageKey = "age";
// person[ageKey] = 31; // using a variable to update the age
            console.log("Updated Age: " + person.age);
        </Script>
    </head>
 </html>
