<!-- write a json object wich contain array of 3 object each object contains two property 
 name and age now sort and array by age in decanding order print name and age in decending order on console  -->
 <script>
    let a = {
        Name:"abc",
        age:18
    }
     let b = {
        Name:"def",
        age:19
    }
     let c = {
        Name:"ghi",
        age:20
    }
    let d = [a,b,c]

    d.sort((a,b)=>b.age -a.age)

    for(let p of d ){
        console.log(p.Name+" "+p.age)
    }
 </script>
